<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>WinterWord</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<base href="/">

<style>

/* SECTION: GLOBAL TOKENS */
:root{
  /* Core */
  --ww-font:system-ui,-apple-system,"Segoe UI",sans-serif;
  --ww-black:#000;
  --ww-white:#fff;

  /* Shared ink */
  --ww-ink:#dce5ec;
  --ww-muted:rgba(220,229,236,0.72);

  /* Shared answer/main rail palette */
  --ww-rail-light-bg:#eef4f8;
  --ww-rail-light-border:rgba(0,0,0,0.05);
  --ww-rail-light-ink:#27485f;
  --ww-rail-light-ink-hover:#1d384a;

  /* Shared dark rail palette */
  --ww-rail-dark-bg:#243748;
  --ww-rail-dark-border:rgba(255,255,255,0.06);
  --ww-rail-dark-ink:#e3edf5;
  --ww-rail-dark-ink-hover:#ffffff;

  /* Legacy clue-dark variant */
  --ww-rail-steel-bg:#2a3f52;
  --ww-rail-steel-border:rgba(255,255,255,0.06);
  --ww-rail-steel-ink:#e3edf5;
  --ww-rail-steel-ink-hover:#ffffff;

  /* Buttons */
  --ww-answer-bg:rgba(127,166,184,0.20);
  --ww-answer-border:rgba(39,72,95,0.18);
  --ww-answer-ink:rgba(29,56,74,0.95);

  --ww-play-bg:rgba(39,72,95,0.10);
  --ww-play-bg-hover:rgba(39,72,95,0.14);
  --ww-play-icon:rgba(29,56,74,0.92);
  --ww-play-border:rgba(39,72,95,0.30);
  --ww-play-border-hover:rgba(39,72,95,0.46);
  --ww-play-border-w:4px;
  --ww-play-size:3.9rem;
  --ww-play-radius:1.25rem;

  --ww-gold-ripple:rgba(212,169,74,0.62);
  --ww-gold-ripple-soft:rgba(212,169,74,0.18);

  /* Rail sizing */
  --ww-left-wide:13.5rem;
  --ww-left-narrow:8.8rem;
  --ww-rail-label-size:.78rem;
  --ww-rail-label-space:.28em;

  /* Tooltip */
  --ww-tooltip-orange-top:#f7d8b2;
  --ww-tooltip-orange-bot:#efbe86;
  --ww-tooltip-ink:#2b1e12;
  --ww-tooltip-title:#6d4a24;
  --ww-tooltip-border:#b87629;
  --ww-tooltip-bg:linear-gradient(180deg, var(--ww-tooltip-orange-top), var(--ww-tooltip-orange-bot));
  --ww-tooltip-shadow:
    0 24px 46px rgba(0,0,0,0.26),
    0 0 0 1px rgba(255,255,255,0.14) inset,
    0 12px 24px rgba(255,255,255,0.10) inset,
    0 -8px 20px rgba(201,124,41,0.08) inset;

  /* Overlay */
  --ww-overlay-black:rgba(0,0,0,0.94);
  --ww-overlay-radius:.9rem;

  /* Welcome exception */
  --ww-welcome-leave-duration:650ms;
  --ww-welcome-leave-ease:cubic-bezier(.22,.61,.36,1);

  /* Breakpoint */
  --ww-break-mobile:820px;
}

*{ box-sizing:border-box; }
html,body{ margin:0; padding:0; }
body{ font-family:var(--ww-font); }

/* SECTION: SHARED UTILITIES */
.ww-hidden{ display:none !important; }
.ww-no-select{
  user-select:none;
  -webkit-user-select:none;
  -webkit-user-drag:none;
}

.ww-overlay{
  position:absolute;
  inset:0;
  background:var(--ww-overlay-black);
  display:none;
  z-index:50;
}
.ww-overlay.is-open{ display:block; }

.ww-overlay-inner{
  position:absolute;
  inset:0;
  display:flex;
  align-items:center;
  justify-content:center;
  padding:3vh 3vw;
}

.ww-overlay-media{
  width:min(90vw,1400px);
  max-height:92vh;
  object-fit:contain;
  background:#000;
  display:block;
  border-radius:var(--ww-overlay-radius);
  box-shadow:0 26px 78px rgba(0,0,0,0.65);
}

.ww-screen-veil{
  position:absolute;
  inset:0;
  background:rgba(0,0,0,0.92);
}

.ww-static-stage{
  position:absolute;
  inset:0;
  display:flex;
  align-items:center;
  justify-content:center;
  padding:3vh 3vw;
}

.ww-static-media{
  width:min(90vw,1400px);
  max-height:90vh;
  object-fit:contain;
  display:block;
}

/* SECTION: UNIFIED RAIL */
.ww-rail-host{
  width:var(--ww-left-narrow);
  min-width:var(--ww-left-narrow);
  height:100vh;
  position:sticky;
  top:0;
  overflow:visible;
  z-index:20;
}
.ww-rail-host[data-rail-width="wide"]{
  width:var(--ww-left-wide);
  min-width:var(--ww-left-wide);
}

.ww-rail{
  position:relative;
  width:100%;
  height:100%;
  overflow:visible;
}

.ww-rail[data-rail-tone="light"]{
  background:var(--ww-rail-light-bg);
  box-shadow:inset -1px 0 0 var(--ww-rail-light-border);
  color:var(--ww-rail-light-ink);
}
.ww-rail[data-rail-tone="dark"]{
  background:var(--ww-rail-dark-bg);
  box-shadow:inset -1px 0 0 var(--ww-rail-dark-border);
  color:var(--ww-rail-dark-ink);
}
.ww-rail[data-rail-tone="steel"]{
  background:var(--ww-rail-steel-bg);
  box-shadow:inset -1px 0 0 var(--ww-rail-steel-border);
  color:var(--ww-rail-steel-ink);
}

.ww-rail-shell{
  height:100%;
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  gap:1rem;
  padding:1.25rem .5rem;
  overflow:visible;
}
.ww-rail[data-rail-width="wide"] .ww-rail-shell{
  gap:1.65rem;
  padding:1.55rem 0 2.6rem;
}

.ww-rail-logo{
  position:relative;
  display:inline-flex;
  text-decoration:none;
}
.ww-rail-logo img{
  display:block;
  height:auto;
  position:relative;
  z-index:1;
}
.ww-rail[data-rail-width="narrow"] .ww-rail-logo img{ width:7.1rem; }
.ww-rail[data-rail-width="wide"] .ww-rail-logo img{ width:9.3rem; }

.ww-rail[data-logo-glow="true"] .ww-rail-logo::before{
  content:"";
  position:absolute;
  inset:-24px;
  border-radius:50%;
  background:radial-gradient(
    circle,
    rgba(255,255,255,0.18) 0%,
    rgba(255,255,255,0.08) 40%,
    rgba(255,255,255,0.00) 70%
  );
  filter:blur(10px);
  z-index:0;
}

.ww-rail[data-logo-dark-glow="true"] .ww-rail-logo::before{
  content:"";
  position:absolute;
  inset:-24px;
  border-radius:50%;
  background:radial-gradient(
    circle,
    rgba(255,255,255,0.14) 0%,
    rgba(255,255,255,0.06) 42%,
    rgba(255,255,255,0) 72%
  );
  filter:blur(10px);
  z-index:0;
}

.ww-rail[data-logo-shadow="true"] .ww-rail-logo img{
  filter:
    drop-shadow(0 8px 12px rgba(0,0,0,0.35))
    drop-shadow(0 2px 3px rgba(0,0,0,0.25));
}

.ww-rail-divider{
  width:36px;
  height:1px;
  background:rgba(255,255,255,0.18);
}

.ww-rail-logo-label{
  font-size:.72rem;
  letter-spacing:.22em;
  text-transform:uppercase;
  font-weight:900;
  color:#ffffff;
  text-shadow:
    0 1px 2px rgba(0,0,0,0.75),
    0 0 4px rgba(255,255,255,0.04);
}

.ww-rail-nav{
  width:100%;
  display:flex;
  flex-direction:column;
  align-items:center;
  gap:.82rem;
  overflow:visible;
}
.ww-rail[data-rail-width="wide"] .ww-rail-nav{
  flex:1;
  justify-content:space-evenly;
}

.ww-rail-link,
.ww-rail-button{
  background:none;
  border:none;
  text-decoration:none;
  cursor:pointer;
  user-select:none;
  -webkit-tap-highlight-color:transparent;
  display:inline-flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  color:inherit;
  position:relative;
  overflow:visible;
}

.ww-rail-text{
  font-weight:900;
  font-size:var(--ww-rail-label-size);
  letter-spacing:var(--ww-rail-label-space);
  text-transform:uppercase;
  opacity:.92;
  transition:
    transform 150ms ease,
    color 150ms ease,
    opacity 150ms ease,
    filter 150ms ease;
}

.ww-rail[data-rail-tone="light"] .ww-rail-text{
  color:var(--ww-rail-light-ink);
}
.ww-rail[data-rail-tone="light"] .ww-rail-link:hover .ww-rail-text,
.ww-rail[data-rail-tone="light"] .ww-rail-button:hover .ww-rail-text{
  color:var(--ww-rail-light-ink-hover);
  opacity:1;
}

.ww-rail[data-rail-tone="dark"] .ww-rail-text,
.ww-rail[data-rail-tone="steel"] .ww-rail-text{
  color:inherit;
}
.ww-rail[data-rail-tone="dark"] .ww-rail-link:hover .ww-rail-text,
.ww-rail[data-rail-tone="dark"] .ww-rail-button:hover .ww-rail-text,
.ww-rail[data-rail-tone="steel"] .ww-rail-link:hover .ww-rail-text,
.ww-rail[data-rail-tone="steel"] .ww-rail-button:hover .ww-rail-text{
  color:#fff;
  opacity:1;
}

.ww-rail-link[data-active="true"] .ww-rail-text,
.ww-rail-button[data-active="true"] .ww-rail-text{
  opacity:1;
}

.ww-rail[data-rail-tone="light"] .ww-rail-link[data-active="true"] .ww-rail-text,
.ww-rail[data-rail-tone="light"] .ww-rail-button[data-active="true"] .ww-rail-text{
  color:#3b4149;
}

.ww-rail[data-rail-tone="dark"] .ww-rail-link[data-active="true"] .ww-rail-text,
.ww-rail[data-rail-tone="dark"] .ww-rail-button[data-active="true"] .ww-rail-text,
.ww-rail[data-rail-tone="steel"] .ww-rail-link[data-active="true"] .ww-rail-text,
.ww-rail[data-rail-tone="steel"] .ww-rail-button[data-active="true"] .ww-rail-text{
  color:#fff;
}

.ww-rail-link[data-disabled="true"],
.ww-rail-button[data-disabled="true"]{
  cursor:default;
  pointer-events:none;
}
.ww-rail-link[data-disabled="true"] .ww-rail-text,
.ww-rail-button[data-disabled="true"] .ww-rail-text{
  opacity:.45;
}

.ww-rail-icon{
  width:4.6rem;
  height:auto;
  transition:
    transform 160ms ease,
    filter 160ms ease,
    opacity 160ms ease;
}
.ww-rail-link:hover .ww-rail-icon,
.ww-rail-button:hover .ww-rail-icon{
  transform:translateY(-1px) scale(1.03);
}
.ww-rail-link[data-active="true"] .ww-rail-icon,
.ww-rail-button[data-active="true"] .ww-rail-icon{
  filter:drop-shadow(0 8px 14px rgba(0,0,0,0.18));
  transform:translateY(-2px) scale(1.02);
}
.ww-rail-link[data-disabled="true"] .ww-rail-icon,
.ww-rail-button[data-disabled="true"] .ww-rail-icon{
  opacity:.35;
  filter:grayscale(1);
}

.ww-rail-tooltip{
  position:absolute;
  top:50%;
  left:calc(100% + 1rem);
  transform:translateY(-50%);
  max-width:18rem;
  min-width:13.5rem;
  padding:1rem 1.15rem;
  background:var(--ww-tooltip-bg);
  border:1px solid var(--ww-tooltip-border);
  border-radius:1rem;
  box-shadow:var(--ww-tooltip-shadow);
  color:var(--ww-tooltip-ink);
  font-size:.82rem;
  line-height:1.52;
  opacity:0;
  pointer-events:none;
  transition:opacity 160ms ease-out;
  z-index:60;
  text-align:left;
}
.ww-rail-tooltip::before{
  content:"";
  position:absolute;
  left:-7px;
  top:50%;
  width:16px;
  height:16px;
  background:inherit;
  border-radius:4px;
  transform:translateY(-50%) rotate(45deg);
  box-shadow:-1px -1px 0 0 var(--ww-tooltip-border);
}
.ww-rail-tooltip-title{
  font-size:.68rem;
  letter-spacing:.18em;
  text-transform:uppercase;
  color:var(--ww-tooltip-title);
  margin-bottom:.35rem;
  text-align:center;
  font-weight:800;
}
.ww-rail[data-show-tooltips="true"] .ww-rail-link:hover .ww-rail-tooltip,
.ww-rail[data-show-tooltips="true"] .ww-rail-button:hover .ww-rail-tooltip{
  opacity:1;
}

/* Answer button */
.ww-rail-answer{
  margin-top:.15rem;
  width:5.9rem;
  padding:.72rem .6rem;
  border-radius:1.15rem;
  border:1px solid var(--ww-answer-border);
  background:var(--ww-answer-bg);
  color:var(--ww-answer-ink);
  font-weight:1000;
  font-size:.70rem;
  letter-spacing:.22em;
  text-transform:uppercase;
  cursor:pointer;
  user-select:none;
  -webkit-tap-highlight-color:transparent;
  transition:
    transform 160ms ease,
    filter 160ms ease,
    opacity 220ms ease,
    visibility 220ms ease;
  text-align:center;
}
.ww-rail-answer:hover{
  filter:brightness(1.05);
  transform:translateY(-1px);
}
.ww-rail-answer:active{
  transform:none;
  filter:brightness(1);
}
.ww-rail-answer[disabled]{
  opacity:.35;
  pointer-events:none;
}

/* Play button */
.ww-rail-play{
  margin-top:1.05rem;
  width:var(--ww-play-size);
  height:var(--ww-play-size);
  border-radius:var(--ww-play-radius);
  border:var(--ww-play-border-w) solid var(--ww-play-border);
  background:var(--ww-play-bg);
  display:flex;
  align-items:center;
  justify-content:center;
  cursor:pointer;
  position:relative;
  overflow:hidden;
  transition:
    opacity 220ms ease,
    transform 160ms ease,
    filter 160ms ease,
    background 160ms ease,
    border-color 160ms ease,
    visibility 220ms ease;
}
.ww-rail-play:hover{
  background:var(--ww-play-bg-hover);
  border-color:var(--ww-play-border-hover);
  filter:brightness(1.04);
  transform:translateY(-1px);
}
.ww-rail-play:active{
  transform:none;
  filter:brightness(1);
}
.ww-rail-play svg{
  width:1.55rem;
  height:1.55rem;
  fill:var(--ww-play-icon);
  transform:translateX(1px);
  position:relative;
  z-index:2;
}

.ww-rail-play.ww-play-ripple::before{
  content:"";
  position:absolute;
  inset:0;
  border-radius:var(--ww-play-radius);
  border:5px solid var(--ww-gold-ripple);
  opacity:0;
  transform:scale(.88);
  animation:wwRailRipple 1800ms ease-out infinite;
  z-index:1;
  box-shadow:0 0 0 1px var(--ww-gold-ripple-soft);
}

@keyframes wwRailRipple{
  0%{ opacity:0; transform:scale(.88); }
  15%{ opacity:.9; }
  100%{ opacity:0; transform:scale(1.28); }
}

.ww-rail-play[data-visibility="hidden"]{
  opacity:0;
  visibility:hidden;
  pointer-events:none;
}
.ww-rail-play[data-visibility="visible"]{
  opacity:1;
  visibility:visible;
  pointer-events:auto;
}

@media (max-width:820px){
  :root{
    --ww-left-narrow:8.4rem;
    --ww-play-size:3.85rem;
  }
  .ww-rail[data-rail-width="narrow"] .ww-rail-logo img{ width:6.6rem; }
  .ww-rail[data-rail-width="wide"] .ww-rail-logo img{ width:8.9rem; }
}

/* SECTION: WELCOME */
#wwWelcomePage{
  width:100%;
  height:100vh;
  display:flex;
  align-items:center;
  justify-content:center;
  position:relative;
  overflow:hidden;
  transition:
    opacity var(--ww-welcome-leave-duration) var(--ww-welcome-leave-ease),
    transform var(--ww-welcome-leave-duration) var(--ww-welcome-leave-ease),
    filter var(--ww-welcome-leave-duration) var(--ww-welcome-leave-ease);
  background:
    radial-gradient(circle at 20% 20%, rgba(255,255,255,.045) 0 1px, transparent 1.5px),
    radial-gradient(circle at 80% 30%, rgba(255,255,255,.03) 0 1px, transparent 1.5px),
    radial-gradient(circle at 30% 80%, rgba(255,255,255,.025) 0 1px, transparent 1.5px),
    linear-gradient(180deg, rgba(255,255,255,.025), rgba(255,255,255,0)),
    repeating-linear-gradient(
      135deg,
      rgba(255,255,255,.018) 0px,
      rgba(255,255,255,.018) 2px,
      transparent 2px,
      transparent 6px
    ),
    radial-gradient(circle at center, #121212 0%, #090909 48%, #030303 100%);
}
#wwWelcomePage::after{
  content:"";
  position:absolute;
  inset:0;
  pointer-events:none;
  background:radial-gradient(circle at center, transparent 45%, rgba(0,0,0,.34) 100%);
}

#wwWelcomeShell{
  position:relative;
  width:min(66.666vw, calc(66.666vh * 16 / 9));
  aspect-ratio:16 / 9;
  border-radius:24px;
  overflow:hidden;
  background:#000;
  border:1px solid rgba(255,255,255,.20);
  box-shadow:
    0 30px 80px rgba(0,0,0,.65),
    0 8px 24px rgba(0,0,0,.45);
}
#wwWelcomeShell::before{
  content:"";
  position:absolute;
  inset:0;
  border-radius:inherit;
  padding:1px;
  background:linear-gradient(
    145deg,
    rgba(255,255,255,.28),
    rgba(255,255,255,.08) 28%,
    rgba(255,255,255,.04) 55%,
    rgba(255,255,255,.18) 100%
  );
  -webkit-mask:linear-gradient(#000 0 0) content-box, linear-gradient(#000 0 0);
  -webkit-mask-composite:xor;
  mask-composite:exclude;
  pointer-events:none;
}
#wwWelcomeShell::after{
  content:"";
  position:absolute;
  inset:10px;
  border-radius:14px;
  border:1px solid rgba(255,255,255,.08);
  pointer-events:none;
}

#wwWelcomeVideo{
  position:absolute;
  inset:0;
  width:100%;
  height:100%;
  object-fit:cover;
}
#wwWelcomeOverlay{
  position:absolute;
  inset:0;
  pointer-events:none;
  background:linear-gradient(
    to bottom,
    rgba(0,0,0,.10),
    rgba(0,0,0,.04) 35%,
    rgba(0,0,0,.16) 100%
  );
}

#wwWelcomePageFade{
  position:fixed;
  inset:0;
  background:#000;
  opacity:0;
  z-index:9999;
  transition:opacity var(--ww-welcome-leave-duration) var(--ww-welcome-leave-ease);
}
body.ww-welcome-leaving #wwWelcomePageFade{ opacity:1; }
body.ww-welcome-leaving #wwWelcomePage{
  opacity:0;
  transform:translateY(-2vh) scale(.985);
  filter:blur(3px);
}

/* SECTION: BASE-STATION / BASE-RESOLVE SHARED */
.ww-hub-wrap{
  display:flex;
  min-height:100vh;
}
.ww-hub-main{
  flex:1;
  min-width:0;
  overflow:hidden;
}
.ww-hub-scroll{
  height:100vh;
  overflow:auto;
}
.ww-hub-view{
  max-width:78rem;
  margin:0 auto;
  padding:4rem;
}

.ww-hub-head{
  position:relative;
  margin-bottom:1.15rem;
  min-height:10.8rem;
  padding-right:340px;
}
.ww-hub-head-copy{ min-width:0; }

.ww-hub-slug{
  font-size:.76rem;
  letter-spacing:.26em;
  text-transform:uppercase;
  font-weight:900;
  margin:0 0 .75rem;
}
.ww-hub-title{
  font-size:2.55rem;
  margin:0;
}

.ww-hub-signal-wrap{
  position:absolute;
  top:.15rem;
  right:0;
  display:flex;
  flex-direction:column;
  align-items:flex-end;
  gap:.75rem;
  padding-top:.15rem;
  z-index:20;
}
.ww-hub-signal{
  display:flex;
  align-items:flex-end;
  gap:1.2rem;
  padding:.9rem 1.1rem;
  border-radius:1.1rem;
  box-shadow:0 14px 34px rgba(0,0,0,0.26);
}
.ww-hub-st-label{
  font-size:.72rem;
  letter-spacing:.3em;
  text-transform:uppercase;
  font-weight:900;
}

.ww-hub-signal-bar{
  display:flex;
  align-items:flex-end;
  gap:6px;
  height:3.6rem;
}
.ww-hub-signal-bar span{
  width:12px;
  height:30%;
  border-radius:4px;
  animation:wwHubSignal 6s infinite;
}
.ww-hub-signal-bar span:nth-child(2){ animation-duration:5.4s; }
.ww-hub-signal-bar span:nth-child(3){ animation-duration:6.8s; }
.ww-hub-signal-bar span:nth-child(4){ animation-duration:5.9s; }
.ww-hub-signal-bar span:nth-child(5){ animation-duration:7.2s; }

@keyframes wwHubSignal{
  0%{ height:28%; }
  45%{ height:100%; }
  100%{ height:34%; }
}

.ww-hub-action-btn{
  appearance:none;
  font-size:.7rem;
  letter-spacing:.16em;
  text-transform:uppercase;
  font-weight:900;
  padding:.62rem .92rem;
  border-radius:.6rem;
  cursor:pointer;
  text-decoration:none;
  display:inline-block;
  position:relative;
  z-index:25;
  transition:
    background 160ms ease,
    border-color 160ms ease,
    transform 160ms ease,
    box-shadow 160ms ease;
}
.ww-hub-action-btn:hover{
  transform:translateY(-1px);
}
.ww-hub-action-btn[aria-expanded="true"]{
  box-shadow:
    0 12px 28px rgba(0,0,0,0.28),
    0 0 0 1px rgba(240,138,36,0.24) inset;
}

.ww-hub-subpanel-wrap{
  position:absolute;
  top:2.2rem;
  right:18.8rem;
  width:300px;
  min-height:1px;
  z-index:40;
  pointer-events:none;
}
.ww-hub-subpanel{
  position:absolute;
  top:0;
  left:0;
  width:300px;

<!-- WINTERWORD ENGINE BOOTSTRAP -->
<script>
(async () => {
  try {
    // The org slug is determined dynamically by the engine,
    // but we bootstrap with a default to load the engine.
    const slug = "testslug";

    const res = await fetch("/api/bootstrap", {
      method: "POST",
      headers: {
        "Content-Type": "application/json"
      },
      body: JSON.stringify({ slug })
    });

    const data = await res.json();

    if (!data.ok) {
      document.body.innerText = "Invalid game.";
      return;
    }

    // Load the engine script returned by the bootstrap API
    const script = document.createElement("script");
    script.src = data.entry + "?v=" + Date.now();

    script.onload = () => console.log("Engine loaded");
    script.onerror = () => {
      document.body.innerText = "Error loading game.";
    };

    document.body.appendChild(script);

  } catch (err) {
    document.body.innerText = "Error loading game.";
  }
})();
</script>

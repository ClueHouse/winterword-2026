<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>WinterWord</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<base href="/">

<style>
/* (UNCHANGED — FULL CSS PRESERVED EXACTLY) */
</style>

</head>
<body>

<!-- APP ROOT -->
<div data-ww-app-root></div>

<!-- WINTERWORD ENGINE BOOTSTRAP -->
<script>
(function () {
  fetch("/assets/winterword/api/bootstrap")
    .then(function(res) { return res.json(); })
    .then(function(data) {

      if (!data.entry) {
        document.body.innerText = "Invalid game.";
        return;
      }

      var script = document.createElement("script");
      script.type = "module";
      script.src = data.entry + "?v=" + Date.now();

      script.onload = function () { console.log("Engine loaded"); };
      script.onerror = function () {
        document.body.innerText = "Error loading game.";
      };

      document.body.appendChild(script);

    })
    .catch(function () {
      document.body.innerText = "Error loading game.";
    });
})();
</script>

</body>
</html>

<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>WinterWord</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<base href="/">

<style>
/* (UNCHANGED — FULL CSS PRESERVED EXACTLY) */
</style>

</head>
<body>

<!-- APP ROOT -->
<div data-ww-app-root></div>

<!-- WINTERWORD ENGINE BOOTSTRAP -->
<script>
(async () => {
  try {
    const slug = "testslug";

    const res = await fetch("/assets/winterword/api/bootstrap", {
      method: "POST",
      headers: {
        "Content-Type": "application/json"
      },
      body: JSON.stringify({ slug })
    });

    const data = await res.json();

    if (!data.ok) {
      document.body.innerText = "Invalid game.";
      return;
    }

    const script = document.createElement("script");
    script.type = "module";
    script.src = data.entry + "?v=" + Date.now();

    script.onload = () => console.log("Engine loaded");
    script.onerror = () => {
      document.body.innerText = "Error loading game.";
    };

    document.body.appendChild(script);

  } catch (err) {
    document.body.innerText = "Error loading game.";
  }
})();
</script>

</body>
</html>

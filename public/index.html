<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>WinterWord 2026</title>
</head>
<body>
  <div id="app">Loading…</div>

  <script>
    (function () {
      fetch("/winterword/assets/winterword/api/bootstrap")
        .then(function(res) { return res.json(); })
        .then(function(data) {

          if (!data.entry) {
            document.body.innerText = "Invalid game.";
            return;
          }

          var script = document.createElement("script");
          script.type = "module";
          script.src = data.entry + "?v=" + Date.now();

          script.onload = function () { console.log("Engine loaded"); };
          script.onerror = function () {
            document.body.innerText = "Error loading game.";
          };

          document.body.appendChild(script);

        })
        .catch(function () {
          document.body.innerText = "Error loading game.";
        });
    })();
  </script>

</body>
</html>
